<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decisionledger — Neural Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #06060A;
    --surface: #0D0D16;
    --border: #1A1A2E;
    --text: #EDEAF8;
    --text-secondary: #8B88AA;
    --muted: #4A4868;
    --primary: #E8A020;
    --success: #34D399;
    --danger: #F87171;
    --warning: #FB923C;
    --violet: #A78BFA;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── Background canvas ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── SVG connections layer ── */
  #connections-svg {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    width: 100%;
    height: 100%;
  }

  /* ── Top bar ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    background: rgba(6,6,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .amber-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary);
    animation: dotPulse 2.5s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--primary); }
    50% { opacity: 0.7; box-shadow: 0 0 16px var(--primary); }
  }

  .wordmark {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text);
    text-transform: uppercase;
  }

  .topbar-right {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  /* ── Interactive nodes ── */
  #nodes-layer {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .node-wrapper {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: all;
    cursor: pointer;
    transform: translate(-50%, -50%);
    --pulse-offset: 0ms;
  }

  .node-circle {
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.2s ease, transform 0.15s ease;
    animation: nodePulse 4s ease-in-out infinite;
    animation-delay: var(--pulse-offset);
  }

  @keyframes nodePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.055); }
  }

  .node-wrapper:hover .node-circle {
    animation: none;
    transform: scale(1.12);
  }

  .node-inner {
    border-radius: 50%;
    width: 60%;
    height: 60%;
    position: absolute;
    opacity: 0.25;
  }

  .node-label {
    margin-top: 8px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
    text-align: center;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
    transition: color 0.2s;
  }

  .node-wrapper:hover .node-label { color: var(--text); }

  .node-wrapper.dimmed .node-circle { opacity: 0.12; filter: none !important; }
  .node-wrapper.dimmed .node-label { opacity: 0.12; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    z-index: 20;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 200px;
    line-height: 1.4;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }

  #tooltip.visible { opacity: 1; }

  /* ── Side panel ── */
  #side-panel {
    position: fixed;
    top: 0; right: 0;
    width: 380px;
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 30;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  #side-panel.open { transform: translateX(0); }

  .panel-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--border);
    border: none;
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .panel-close:hover { background: var(--muted); color: var(--text); }

  .panel-type-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 4px;
  }

  .panel-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 4px;
  }

  .panel-description {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .confidence-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
  }

  .confidence-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }

  .panel-snippet {
    border-left: 3px solid var(--muted);
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--text-secondary);
    font-style: italic;
    line-height: 1.6;
  }

  .panel-divider {
    height: 1px;
    background: var(--border);
  }

  .panel-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .panel-related-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .panel-related-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .related-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  .panel-view-all {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
    margin-top: auto;
    padding-top: 8px;
    border: none;
    background: none;
    font-family: inherit;
  }
  .panel-view-all:hover { opacity: 0.8; }

  /* ── Hook notification ── */
  #hook-notification {
    position: fixed;
    bottom: 80px; left: 24px;
    z-index: 40;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 300px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    cursor: pointer;
    transform: translateY(20px);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
    pointer-events: none;
  }

  #hook-notification.visible {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .hook-arrow { color: var(--primary); margin-left: 4px; }

  /* ── Filter pills ── */
  #filter-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 6px;
    background: rgba(13,13,22,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 8px;
  }

  .filter-pill {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 5px 14px;
    border-radius: 30px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }

  .filter-pill:hover { background: var(--border); color: var(--text); }
  .filter-pill.active { background: var(--primary); color: #000; font-weight: 600; }
</style>
</head>

// ──────────────────────────────────────────────
// BACKGROUND CANVAS
// ──────────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); drawConnections(); });

const BG_NODE_COUNT = 100;
const bgNodes = [];

for (let i = 0; i < BG_NODE_COUNT; i++) {
  bgNodes.push({
    x: Math.random() * 2 - 0.5,  // normalized 0-1 with overflow
    y: Math.random() * 2 - 0.5,
    vx: (Math.random() - 0.5) * 0.00008,
    vy: (Math.random() - 0.5) * 0.00008,
    r: 1.5 + Math.random() * 1.5,
    baseOpacity: 0.12 + Math.random() * 0.18,
    pulsePhase: Math.random() * Math.PI * 2,
    pulseSpeed: 0.003 + Math.random() * 0.005,
    color: Math.random() < 0.7 ? '#E8A020' : '#FB923C'
  });
}

const CONNECTION_DIST = 0.22;

let bgT = 0;
function animateBg() {
  bgT += 1;
  ctx.clearRect(0, 0, W, H);

  // Update positions
  for (const n of bgNodes) {
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < -0.1) n.x = 1.1;
    if (n.x > 1.1) n.x = -0.1;
    if (n.y < -0.1) n.y = 1.1;
    if (n.y > 1.1) n.y = -0.1;
    n.pulsePhase += n.pulseSpeed;
  }

  // Draw connections
  for (let i = 0; i < bgNodes.length; i++) {
    for (let j = i + 1; j < bgNodes.length; j++) {
      const a = bgNodes[i], b = bgNodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < CONNECTION_DIST) {
        const alpha = (1 - dist / CONNECTION_DIST) * 0.07;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(232,160,32,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(a.x * W, a.y * H);
        ctx.lineTo(b.x * W, b.y * H);
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  for (const n of bgNodes) {
    const pulse = Math.sin(n.pulsePhase) * 0.5 + 0.5;
    const opacity = n.baseOpacity * (0.7 + 0.3 * pulse);
    ctx.beginPath();
    ctx.arc(n.x * W, n.y * H, n.r, 0, Math.PI * 2);
    ctx.fillStyle = n.color + Math.round(opacity * 255).toString(16).padStart(2, '0');
    ctx.fill();
  }

  requestAnimationFrame(animateBg);
}
animateBg();

// ──────────────────────────────────────────────
// INTERACTIVE NODES
// ──────────────────────────────────────────────
const nodesLayer = document.getElementById('nodes-layer');
const tooltip = document.getElementById('tooltip');

const nodeEls = {};

NODES.forEach((node, i) => {
  const cfg = TYPE_CONFIG[node.type];
  const wrapper = document.createElement('div');
  wrapper.className = 'node-wrapper';
  wrapper.dataset.id = node.id;
  wrapper.dataset.type = node.type;
  wrapper.style.left = node.px + '%';
  wrapper.style.top = node.py + '%';
  wrapper.style.setProperty('--pulse-offset', (i * 320) + 'ms');

  const circle = document.createElement('div');
  circle.className = 'node-circle';
  circle.style.width = cfg.size + 'px';
  circle.style.height = cfg.size + 'px';
  circle.style.background = cfg.color + '22';
  circle.style.border = `2px solid ${cfg.color}88`;
  circle.style.boxShadow = `0 0 12px ${cfg.color}44, inset 0 0 8px ${cfg.color}22`;

  const inner = document.createElement('div');
  inner.className = 'node-inner';
  inner.style.background = `radial-gradient(circle, ${cfg.color}55 0%, transparent 70%)`;
  circle.appendChild(inner);

  const label = document.createElement('div');
  label.className = 'node-label';
  label.textContent = node.label;

  wrapper.appendChild(circle);
  wrapper.appendChild(label);
  nodesLayer.appendChild(wrapper);
  nodeEls[node.id] = wrapper;

  // Hover
  wrapper.addEventListener('mouseenter', (e) => {
    circle.style.boxShadow = `0 0 28px ${cfg.color}88, 0 0 8px ${cfg.color}55, inset 0 0 12px ${cfg.color}33`;
    circle.style.borderColor = cfg.color;
    circle.style.background = cfg.color + '44';
    tooltip.textContent = node.title;
    tooltip.classList.add('visible');
  });

  wrapper.addEventListener('mousemove', (e) => {
    let tx = e.clientX + 14;
    let ty = e.clientY - 30;
    if (tx + 200 > window.innerWidth) tx = e.clientX - 214;
    if (ty < 0) ty = e.clientY + 14;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  });

  wrapper.addEventListener('mouseleave', () => {
    circle.style.boxShadow = `0 0 12px ${cfg.color}44, inset 0 0 8px ${cfg.color}22`;
    circle.style.borderColor = cfg.color + '88';
    circle.style.background = cfg.color + '22';
    tooltip.classList.remove('visible');
  });

  wrapper.addEventListener('click', () => openPanel(node));
});

// ──────────────────────────────────────────────
// SVG CONNECTIONS
// ──────────────────────────────────────────────
const svg = document.getElementById('connections-svg');

function getNodeCenter(id) {
  const el = nodeEls[id];
  if (!el) return null;
  const rect = el.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function drawConnections() {
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svg.appendChild(defs);

  CONNECTIONS.forEach(([aId, bId, style]) => {
    const a = getNodeCenter(aId);
    const b = getNodeCenter(bId);
    if (!a || !b) return;

    const nodeA = NODES.find(n => n.id === aId);
    const nodeB = NODES.find(n => n.id === bId);
    if (!nodeA || !nodeB) return;

    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    // Perpendicular offset for curve
    const len = Math.sqrt(dx*dx + dy*dy);
    const curve = len * 0.25;
    const nx = -dy / len * curve;
    const ny = dx / len * curve;

    const cx = mx + nx;
    const cy = my + ny;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = `M ${a.x} ${a.y} Q ${cx} ${cy} ${b.x} ${b.y}`;
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');

    if (style === 'contradict') {
      path.setAttribute('stroke', '#F87171');
      path.setAttribute('stroke-opacity', '0.35');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('stroke-dasharray', '5,4');
    } else {
      // Color based on node types
      let color = '#E8A020';
      if (nodeA.type === 'goal' || nodeB.type === 'goal') color = '#34D399';
      else if (nodeA.type === 'pattern' || nodeB.type === 'pattern') color = '#A78BFA';
      else if (nodeA.type === 'question' || nodeB.type === 'question') color = '#FB923C';

      path.setAttribute('stroke', color);
      path.setAttribute('stroke-opacity', '0.22');
      path.setAttribute('stroke-width', '1');
    }

    svg.appendChild(path);
  });
}

// Draw after layout settles
setTimeout(drawConnections, 100);
window.addEventListener('resize', () => setTimeout(drawConnections, 50));

// ──────────────────────────────────────────────
// SIDE PANEL
// ──────────────────────────────────────────────
const sidePanel = document.getElementById('side-panel');
const panelContent = document.getElementById('panel-content');
const panelCloseBtn = document.getElementById('panel-close-btn');

let hookTimer = null;
const hookNotif = document.getElementById('hook-notification');

function openPanel(node) {
  const cfg = TYPE_CONFIG[node.type];
  const relatedNodes = (node.related || []).map(id => NODES.find(n => n.id === id)).filter(Boolean);

  panelContent.innerHTML = `
    <span class="panel-type-badge" style="background:${cfg.color}22;color:${cfg.color}">${cfg.label}</span>
    <div class="panel-title">${node.title}</div>
    <p class="panel-description">${node.description}</p>
    <div class="confidence-badge">
      <div class="confidence-dot" style="background:${node.confidence > 0.8 ? '#34D399' : node.confidence > 0.65 ? '#FB923C' : '#F87171'}"></div>
      Confidence ${Math.round(node.confidence * 100)}%
    </div>
    <div class="panel-divider"></div>
    <div class="panel-snippet">${node.snippet}</div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">Connected entities</div>
    <div class="panel-related-list">
      ${relatedNodes.map(r => {
        const rc = TYPE_CONFIG[r.type];
        return `<div class="panel-related-item">
          <div class="related-dot" style="background:${rc.color}"></div>
          <span style="color:${rc.color};font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-right:6px">${rc.label}</span>
          <span>${r.label}</span>
        </div>`;
      }).join('')}
    </div>
    <button class="panel-view-all">View all ${cfg.label.toLowerCase()}s <span>→</span></button>
  `;

  sidePanel.classList.add('open');

  // Hook notification
  if (hookTimer) clearTimeout(hookTimer);
  hookNotif.classList.remove('visible');

  hookTimer = setTimeout(() => {
    hookNotif.textContent = node.hook || 'Connected to recent patterns →';
    hookNotif.innerHTML += '<span class="hook-arrow">→</span>';
    hookNotif.classList.add('visible');
    const dismissTimer = setTimeout(() => hookNotif.classList.remove('visible'), 5000);
    hookNotif.onclick = () => { hookNotif.classList.remove('visible'); clearTimeout(dismissTimer); };
  }, 1500);
}

panelCloseBtn.addEventListener('click', () => {
  sidePanel.classList.remove('open');
  if (hookTimer) clearTimeout(hookTimer);
  hookNotif.classList.remove('visible');
});

// ──────────────────────────────────────────────
// FILTER PILLS
// ──────────────────────────────────────────────
const filterPills = document.querySelectorAll('.filter-pill');
let activeFilter = 'all';

filterPills.forEach(pill => {
  pill.addEventListener('click', () => {
    filterPills.forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.filter;

    Object.values(nodeEls).forEach(el => {
      if (activeFilter === 'all' || el.dataset.type === activeFilter) {
        el.classList.remove('dimmed');
      } else {
        el.classList.add('dimmed');
      }
    });
  });
});
</script>
</body>
</html>
