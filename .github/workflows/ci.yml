name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ""   # not needed — API calls are mocked in tests
        run: pytest tests/ -v --tb=short

      - name: Check openapi.json is up to date
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ""
        run: |
          python export_schema.py
          git diff --exit-code ../openapi.json || \
            (echo "openapi.json is stale — run 'python backend/export_schema.py' and commit the result" && exit 1)

  frontend-typecheck:
    name: Frontend type-check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check api-types.gen.ts is up to date
        working-directory: frontend
        run: |
          npm run generate:api
          git diff --exit-code src/lib/api-types.gen.ts || \
            (echo "api-types.gen.ts is stale — run 'npm run generate:api' in frontend/ and commit the result" && exit 1)

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
