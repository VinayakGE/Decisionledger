<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decisionledger — Neural Map v2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --amber: #E8A020;
    --amber-dim: #E8A02033;
    --amber-glow: #E8A02018;
    --text: #e8e6e0;
    --muted: #5a5855;
    --border: #1e1d1b;
    --panel: #111110;
    --violet: #7c6fff;
    --violet-dim: #7c6fff22;
    --red: #e05555;
    --red-dim: #e0555522;
    --green: #4caf7d;
    --green-dim: #4caf7d22;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'SF Pro Display', -apple-system, sans-serif; }

  #canvas-bg { position: fixed; inset: 0; z-index: 0; }

  #map { position: fixed; inset: 0; z-index: 1; }

  #edges-svg {
    position: fixed; inset: 0; z-index: 2;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .node {
    position: absolute;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity 0.6s ease;
    z-index: 10;
    opacity: 0;
    transform: translate(-50%, -50%);
    will-change: transform;
  }

  .node.visible { opacity: 1; }

  .node-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: box-shadow 0.3s ease;
  }

  .node-label {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    pointer-events: none;
    text-align: center;
    max-width: 120px;
    white-space: normal;
    line-height: 1.3;
  }

  .node-verdict {
    position: absolute;
    top: calc(100% + 32px);
    left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* Side panel */
  #panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 320px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    padding: 28px 24px;
  }

  #panel.open { transform: translateX(0); }

  .panel-type {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  .panel-title {
    font-size: 17px; font-weight: 300; color: var(--text);
    line-height: 1.4; margin-bottom: 20px;
  }

  .panel-meta {
    font-size: 11px; color: var(--muted); margin-bottom: 6px;
  }

  .panel-snippet {
    font-size: 12px; color: #8a8580;
    border-left: 2px solid var(--amber-dim);
    padding-left: 12px; line-height: 1.6;
    margin: 16px 0;
    font-style: italic;
  }

  .outcome-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 16px;
  }

  .outcome-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }

  .outcome-text {
    font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 12px;
  }

  .outcome-actual-label { color: var(--green); }
  .outcome-pending-label { color: var(--amber); }

  .connected-list { margin-top: 20px; }
  .connected-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
    cursor: pointer;
  }
  .connected-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  #panel-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 4px;
    line-height: 1;
  }

  /* Hook pill */
  #hook-bar {
    position: fixed;
    bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    display: flex; gap: 10px; flex-direction: column; align-items: center;
  }

  .hook-pill {
    background: var(--panel);
    border: 1px solid var(--amber-dim);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 11px; color: var(--amber);
    font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer;
    opacity: 0;
    animation: hookFadeIn 0.5s ease forwards;
    transition: border-color 0.2s, background 0.2s;
  }
  .hook-pill:hover { background: var(--amber-dim); border-color: var(--amber); }

  @keyframes hookFadeIn { to { opacity: 1; } }

  /* Legend */
  #legend {
    position: fixed; bottom: 28px; left: 28px;
    z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .legend-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--muted);
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .legend-line { width: 20px; height: 1px; }

  /* Wordmark */
  #wordmark {
    position: fixed; top: 24px; left: 28px; z-index: 200;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--amber);
  }

  #hint {
    position: fixed; top: 24px; right: 28px; z-index: 200;
    font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div id="map"></div>
<svg id="edges-svg"></svg>

<div id="wordmark">Decisionledger</div>
<div id="hint">Click any node to explore</div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<div id="hook-bar"></div>

<div id="legend">
  <div class="legend-row">
    <div class="legend-line" style="background: var(--violet); opacity: 0.6;"></div>
    Influence
  </div>
  <div class="legend-row">
    <div class="legend-line" style="background: var(--red); opacity: 0.6; border-top: 1px dashed var(--red);"></div>
    Contradiction
  </div>
  <div class="legend-row">
    <div class="legend-line" style="background: var(--amber); opacity: 0.4;"></div>
    Context
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const NODES = [
  // Gravitational center — behavioral pattern (mass=5, largest, most connected)
  {
    id: 'p1', type: 'pattern', mass: 5,
    label: 'Avoids conflict in decisions',
    snippet: '"We didn\'t want to rock the boat, so we went with consensus rather than best option."',
    color: '#E8A020', ring: -1  // -1 = center
  },

  // Inner ring (ring 0) — high-mass decisions
  {
    id: 'd1', type: 'decision', mass: 4,
    label: 'Hire AE after 12 customers',
    snippet: '"We decided to bring on our first AE once we hit the 12-customer mark."',
    confidence: 0.91,
    outcome: { expected: 'Close 3 deals/month within 60 days', actual: 'Closed 2 deals/month, took 90 days', verdict: 'partial', impact: 'Slower than expected but model validated' },
    color: '#E8A020', ring: 0
  },
  {
    id: 'd2', type: 'decision', mass: 4,
    label: 'Skip seed round, go direct to Series A',
    snippet: '"We\'re going straight to Series A — we have enough traction to skip the seed."',
    confidence: 0.88,
    outcome: { expected: 'Raise $5M at $20M valuation', actual: null, verdict: 'pending', impact: null },
    color: '#E8A020', ring: 0
  },
  {
    id: 'd3', type: 'decision', mass: 3.5,
    label: 'Product-led, no outbound',
    snippet: '"We\'re betting on product-led growth — no SDRs, no cold outreach."',
    confidence: 0.85,
    outcome: { expected: 'Organic CAC under $200', actual: 'Organic CAC $380', verdict: 'negative', impact: 'Need to revisit PLG assumption' },
    color: '#E8A020', ring: 0
  },

  // Mid ring (ring 1) — reasons, goals, constraints
  {
    id: 'r1', type: 'reason', mass: 2.5,
    label: 'AE hire driven by inbound volume',
    snippet: '"We had more demos booked than we could handle ourselves."',
    confidence: 0.87,
    color: '#7c6fff', ring: 1
  },
  {
    id: 'g1', type: 'goal', mass: 2.5,
    label: '$50k MRR by Q3',
    snippet: '"We need $50k MRR to prove viability before the raise."',
    confidence: 0.82,
    color: '#4caf7d', ring: 1
  },
  {
    id: 'c1', type: 'constraint', mass: 2,
    label: '18-month runway limit',
    snippet: '"We have 18 months of runway — that\'s the hard constraint."',
    confidence: 0.94,
    color: '#e05555', ring: 1
  },
  {
    id: 'q1', type: 'open_question', mass: 2,
    label: 'Bridge round or direct Series A?',
    snippet: '"We\'re still debating — bridge keeps us alive but signals weakness to A investors."',
    confidence: 0.79,
    color: '#a0a0a0', ring: 1
  },
  {
    id: 'r2', type: 'reason', mass: 2,
    label: 'Series A chosen for signal strength',
    snippet: '"A seed would cap our valuation — going straight to A sends a stronger signal."',
    confidence: 0.76,
    color: '#7c6fff', ring: 1
  },

  // Outer ring (ring 2) — evidence, action items, peripheral
  {
    id: 'e1', type: 'evidence', mass: 1.5,
    label: '3 enterprise pilots confirmed',
    snippet: '"Three enterprise customers said yes to pilots — that\'s the data we needed."',
    confidence: 0.91,
    color: '#60a5fa', ring: 2
  },
  {
    id: 'a1', type: 'action_item', mass: 1.5,
    label: 'Finalize pitch deck by Friday',
    snippet: '"We need the deck done by Friday for the LP intro call."',
    confidence: 0.85,
    color: '#f59e0b', ring: 2
  },
  {
    id: 'a2', type: 'action_item', mass: 1.5,
    label: 'Interview 2 AE candidates this week',
    snippet: '"Let\'s move fast — two interviews lined up for this week."',
    confidence: 0.80,
    color: '#f59e0b', ring: 2
  },
  {
    id: 'e2', type: 'evidence', mass: 1.5,
    label: 'Competitor raised at 15x ARR',
    snippet: '"Competitor just closed at 15x ARR — that benchmarks our ask."',
    confidence: 0.72,
    color: '#60a5fa', ring: 2
  },
  {
    id: 'q2', type: 'open_question', mass: 1,
    label: 'When does PLG actually break?',
    snippet: '"We haven\'t stress-tested PLG above $500k ARR — when does it stop working?"',
    confidence: 0.68,
    color: '#a0a0a0', ring: 2
  },
  {
    id: 'p2', type: 'pattern', mass: 1.5,
    label: 'Anchors on external signals',
    snippet: '"Competitor benchmarks, investor signals — external data drives choices more than internal."',
    color: '#E8A020', ring: 2
  },
  {
    id: 'o1', type: 'outcome', mass: 2,
    label: 'PLG CAC exceeded target',
    outcome: { expected: 'Organic CAC under $200', actual: 'Organic CAC $380 — 90% overshoot', verdict: 'negative', impact: 'Core growth model needs revision before Series A' },
    color: '#e05555', ring: 2
  },
];

// Edge definitions: [from, to, type]
const EDGES = [
  ['r1', 'd1', 'influence'],
  ['g1', 'd1', 'context'],
  ['c1', 'd2', 'influence'],
  ['r2', 'd2', 'influence'],
  ['q1', 'd2', 'context'],
  ['e1', 'd2', 'influence'],
  ['e2', 'd2', 'context'],
  ['a1', 'd2', 'context'],
  ['a2', 'd1', 'context'],
  ['g1', 'd3', 'influence'],
  ['q2', 'd3', 'context'],
  ['o1', 'd3', 'contradiction'],
  ['p1', 'd1', 'context'],
  ['p1', 'd2', 'context'],
  ['p2', 'd2', 'influence'],
  ['e1', 'g1', 'context'],
  ['c1', 'g1', 'context'],
];

// Sync groups: nodes that pulse together
const SYNC_GROUPS = [
  ['d1', 'r1', 'a2'],
  ['d2', 'r2', 'q1', 'e2', 'a1'],
  ['d3', 'g1', 'q2', 'o1'],
  ['p1', 'p2'],
];

// Cost hooks
const HOOKS = [
  { text: '⚠ Open question blocking 2 downstream hiring decisions', node: 'q1' },
  { text: '↻ PLG outcome invalidates current Series A narrative', node: 'o1' },
  { text: '✓ AE hire outcome: validate or revisit your model', node: 'd1' },
];

// ─── LAYOUT ──────────────────────────────────────────────────────────────────
const CX = window.innerWidth / 2;
const CY = window.innerHeight / 2;
const RING_RADII = [160, 275, 395];

function layoutNodes() {
  const rings = [[], [], []];
  let center = null;

  for (const n of NODES) {
    if (n.ring === -1) { center = n; continue; }
    rings[n.ring].push(n);
  }

  // Place center
  if (center) { center.x = CX; center.y = CY; }

  // Place rings
  for (let r = 0; r < 3; r++) {
    const ring = rings[r];
    const radius = RING_RADII[r];
    ring.forEach((n, i) => {
      const angle = (i / ring.length) * Math.PI * 2 - Math.PI / 2;
      n.baseAngle = angle;
      n.angle = angle;
      n.radius = radius;
      n.x = CX + Math.cos(angle) * radius;
      n.y = CY + Math.sin(angle) * radius;
      n.speed = (0.00008 + Math.random() * 0.00004) * (r === 0 ? 1.4 : r === 1 ? 1.0 : 0.65);
      n.direction = Math.random() > 0.5 ? 1 : -1;
    });
  }
}

// ─── NODE SIZING ─────────────────────────────────────────────────────────────
function nodeSize(n) {
  return 20 + n.mass * 8;
}

// ─── CANVAS BACKGROUND ───────────────────────────────────────────────────────
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let ambientNodes = [];

function initCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  ambientNodes = [];
  for (let i = 0; i < 120; i++) {
    ambientNodes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.15 + 0.02,
      angle: Math.random() * Math.PI * 2,
      opacity: Math.random() * 0.25 + 0.05,
    });
  }
}

function drawCanvas(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Radial amber glow at center
  const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, 300);
  grd.addColorStop(0, 'rgba(232, 160, 32, 0.07)');
  grd.addColorStop(1, 'rgba(232, 160, 32, 0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Ambient particles drift
  for (const n of ambientNodes) {
    n.x += Math.cos(n.angle) * n.speed;
    n.y += Math.sin(n.angle) * n.speed;
    n.angle += 0.002;

    if (n.x < 0) n.x = canvas.width;
    if (n.x > canvas.width) n.x = 0;
    if (n.y < 0) n.y = canvas.height;
    if (n.y > canvas.height) n.y = 0;

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232, 160, 32, ${n.opacity})`;
    ctx.fill();
  }
}

// ─── DOM NODES ───────────────────────────────────────────────────────────────
const nodeEls = {};
const map = document.getElementById('map');

function createNodeEl(n) {
  const size = nodeSize(n);
  const el = document.createElement('div');
  el.className = 'node';
  el.id = 'node-' + n.id;
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  if (n.ring === -1) {
    // Center: amber pulsing ring
    inner.style.background = 'radial-gradient(circle at 40% 35%, #f5c855, #E8A020)';
    inner.style.boxShadow = `0 0 30px ${n.color}55, 0 0 60px ${n.color}22`;
  } else {
    inner.style.background = n.color + '22';
    inner.style.border = `1.5px solid ${n.color}55`;
    inner.style.boxShadow = `0 0 12px ${n.color}22`;
  }

  const label = document.createElement('div');
  label.className = 'node-label';
  label.textContent = n.label;

  // Verdict badge
  if (n.outcome) {
    const verdict = document.createElement('div');
    verdict.className = 'node-verdict';
    if (n.outcome.verdict === 'partial' || n.outcome.verdict === 'positive') {
      verdict.textContent = '✓ Outcome measured';
      verdict.style.color = '#4caf7d';
    } else if (n.outcome.verdict === 'negative') {
      verdict.textContent = '✗ Outcome negative';
      verdict.style.color = '#e05555';
    } else {
      verdict.textContent = '⏳ Awaiting outcome';
      verdict.style.color = '#E8A020';
    }
    el.appendChild(verdict);
  }

  el.appendChild(inner);
  el.appendChild(label);
  el.addEventListener('click', () => openPanel(n));
  el.addEventListener('mouseenter', () => highlightConnected(n.id));
  el.addEventListener('mouseleave', clearHighlight);

  map.appendChild(el);
  nodeEls[n.id] = el;
  return el;
}

// ─── EDGES ───────────────────────────────────────────────────────────────────
const svg = document.getElementById('edges-svg');
const edgeEls = {};

function createEdges() {
  for (const [from, to, type] of EDGES) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke-width', type === 'contradiction' ? '1.5' : '1');
    line.setAttribute('opacity', '0.25');
    if (type === 'influence') line.setAttribute('stroke', '#7c6fff');
    else if (type === 'contradiction') { line.setAttribute('stroke', '#e05555'); line.setAttribute('stroke-dasharray', '4 3'); }
    else line.setAttribute('stroke', '#E8A020');
    svg.appendChild(line);
    edgeEls[from + '-' + to] = line;
  }
}

function updateEdges() {
  for (const [from, to] of EDGES) {
    const nf = NODES.find(n => n.id === from);
    const nt = NODES.find(n => n.id === to);
    if (!nf || !nt) continue;
    const line = edgeEls[from + '-' + to];
    if (!line) continue;

    const sf = nodeSize(nf) / 2;
    const st = nodeSize(nt) / 2;
    const dx = nt.x - nf.x, dy = nt.y - nf.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const x1 = nf.x + dx / dist * sf;
    const y1 = nf.y + dy / dist * sf;
    const x2 = nt.x - dx / dist * st;
    const y2 = nt.y - dy / dist * st;
    const mx = (x1 + x2) / 2 + (dy / dist) * 40;
    const my = (y1 + y2) / 2 - (dx / dist) * 40;
    line.setAttribute('d', `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
  }
}

// ─── PANEL ───────────────────────────────────────────────────────────────────
function openPanel(n) {
  const panel = document.getElementById('panel');
  const content = document.getElementById('panel-content');

  const typeLabel = { decision: 'Decision', reason: 'Reason', evidence: 'Evidence', goal: 'Goal', constraint: 'Constraint', open_question: 'Open Question', action_item: 'Action Item', outcome: 'Outcome', pattern: 'Behavioral Pattern' };

  let html = `<div class="panel-type">${typeLabel[n.type] || n.type}</div>`;
  html += `<div class="panel-title">${n.label}</div>`;

  if (n.confidence) {
    html += `<div class="panel-meta">Confidence: <strong style="color:var(--text)">${Math.round(n.confidence * 100)}%</strong></div>`;
  }

  if (n.snippet) {
    html += `<div class="panel-snippet">${n.snippet}</div>`;
  }

  if (n.outcome) {
    html += `<div class="outcome-card">`;
    html += `<div class="outcome-label">Expected outcome</div>`;
    html += `<div class="outcome-text">${n.outcome.expected}</div>`;
    if (n.outcome.actual) {
      html += `<div class="outcome-label outcome-actual-label">What actually happened</div>`;
      html += `<div class="outcome-text">${n.outcome.actual}</div>`;
    } else {
      html += `<div class="outcome-label outcome-pending-label">⏳ Not yet measured</div>`;
    }
    if (n.outcome.impact) {
      html += `<div class="outcome-label" style="margin-top:10px">Impact</div>`;
      html += `<div class="outcome-text" style="color:var(--muted)">${n.outcome.impact}</div>`;
    }
    html += `</div>`;
  }

  // Connected nodes
  const connected = EDGES
    .filter(([f, t]) => f === n.id || t === n.id)
    .map(([f, t, type]) => ({ id: f === n.id ? t : f, type }));

  if (connected.length) {
    html += `<div class="connected-list"><div class="panel-meta" style="margin-bottom:10px">Connected (${connected.length})</div>`;
    for (const c of connected) {
      const cn = NODES.find(nd => nd.id === c.id);
      if (!cn) continue;
      html += `<div class="connected-item" onclick="openPanel(NODES.find(n=>n.id==='${cn.id}'))">
        <div class="connected-dot" style="background:${cn.color}"></div>
        ${cn.label}
      </div>`;
    }
    html += `</div>`;
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// ─── HIGHLIGHT ────────────────────────────────────────────────────────────────
function highlightConnected(id) {
  const connected = new Set([id]);
  for (const [f, t] of EDGES) {
    if (f === id) connected.add(t);
    if (t === id) connected.add(f);
  }
  for (const n of NODES) {
    const el = nodeEls[n.id];
    if (!el) continue;
    el.style.opacity = connected.has(n.id) ? '1' : '0.2';
  }
  for (const [from, to] of EDGES) {
    const line = edgeEls[from + '-' + to];
    if (!line) continue;
    line.setAttribute('opacity', (from === id || to === id) ? '0.7' : '0.05');
  }
}

function clearHighlight() {
  for (const el of Object.values(nodeEls)) el.style.opacity = '1';
  for (const line of Object.values(edgeEls)) line.setAttribute('opacity', '0.25');
}

// ─── PULSE ANIMATION ─────────────────────────────────────────────────────────
const pulsePhase = {};
SYNC_GROUPS.forEach((group, gi) => {
  group.forEach(id => { pulsePhase[id] = gi * (Math.PI * 2 / SYNC_GROUPS.length); });
});

function applyPulse(t) {
  for (const n of NODES) {
    const el = nodeEls[n.id];
    if (!el) continue;
    const inner = el.querySelector('.node-inner');
    if (!inner) continue;
    const phase = pulsePhase[n.id] ?? 0;
    const pulse = 0.5 + 0.5 * Math.sin(t * 0.0008 + phase);
    const alpha = Math.round((0.15 + pulse * 0.25) * 255).toString(16).padStart(2, '0');
    if (n.ring === -1) {
      // center glows
      const glow = 30 + pulse * 30;
      inner.style.boxShadow = `0 0 ${glow}px ${n.color}66, 0 0 ${glow * 2}px ${n.color}22`;
    } else {
      inner.style.boxShadow = `0 0 ${8 + pulse * 14}px ${n.color}${alpha}`;
    }
  }
}

// ─── ORBITAL MOTION ──────────────────────────────────────────────────────────
function orbitNodes(t) {
  for (const n of NODES) {
    if (n.ring === -1 || n.ring === undefined) continue;
    n.angle += n.speed * n.direction;
    n.x = CX + Math.cos(n.angle) * n.radius;
    n.y = CY + Math.sin(n.angle) * n.radius;

    const el = nodeEls[n.id];
    if (el) {
      el.style.left = n.x + 'px';
      el.style.top = n.y + 'px';
    }
  }
}

// ─── EMERGENCE ───────────────────────────────────────────────────────────────
function emergeNodes() {
  const sorted = [...NODES].sort((a, b) => b.mass - a.mass);
  sorted.forEach((n, i) => {
    setTimeout(() => {
      const el = nodeEls[n.id];
      if (el) el.classList.add('visible');
    }, 300 + i * 95);
  });
}

// ─── HOOKS ───────────────────────────────────────────────────────────────────
function spawnHooks() {
  const bar = document.getElementById('hook-bar');
  HOOKS.forEach((h, i) => {
    setTimeout(() => {
      const pill = document.createElement('div');
      pill.className = 'hook-pill';
      pill.textContent = h.text;
      pill.style.animationDelay = '0s';
      pill.onclick = () => {
        const n = NODES.find(nd => nd.id === h.node);
        if (n) openPanel(n);
      };
      bar.appendChild(pill);
    }, 2000 + i * 600);
  });
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let started = false;

function init() {
  initCanvas();
  layoutNodes();
  createEdges();
  for (const n of NODES) createNodeEl(n);
  emergeNodes();
  spawnHooks();

  function loop(t) {
    drawCanvas(t);
    orbitNodes(t);
    updateEdges();
    applyPulse(t);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  initCanvas();
});

init();
</script>
</body>
</html>
